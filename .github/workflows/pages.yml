name: Deploy to GitHub Pages

on:
  # Deploy on any direct push to main (e.g. editing papers/site by hand).
  push:
    branches: [main]
  # Also deploy after the daily crawl finishes — commits pushed by a workflow
  # using GITHUB_TOKEN do NOT trigger `push`, so we chain explicitly here.
  workflow_run:
    workflows: ["Daily paper crawl"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # For a workflow_run trigger, only deploy if the crawl succeeded. Direct
    # pushes and manual dispatches always deploy.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run runs against the default branch ref; make sure we grab
          # the latest main (including the crawl's fresh commit).
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the static site (no build step).
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
