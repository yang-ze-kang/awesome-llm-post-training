<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awesome LLM Post-Training</title>
  <meta name="description" content="A curated, bilingual, auto-updating collection of LLM post-training papers." />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1 data-i18n="title">Awesome LLM Post-Training</h1>
        <p class="tagline" data-i18n="tagline">A curated, auto-updating collection of LLM post-training papers.</p>
      </div>
      <div class="controls">
        <button id="lang-toggle" class="btn" title="Switch language">中文</button>
        <button id="theme-toggle" class="btn" title="Toggle theme" aria-label="Toggle theme">🌙</button>
        <a class="btn btn-link" href="https://github.com/mbzuai-oryx/Awesome-LLM-Post-training" target="_blank" rel="noopener" data-i18n="source">Source</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <input type="search" id="search" data-i18n-ph="search" placeholder="Search papers..." />
      <nav id="category-nav" class="category-nav"></nav>
      <div class="stats">
        <span id="paper-count"></span>
        <span id="last-updated" class="muted"></span>
      </div>
    </aside>

    <main class="content">
      <div id="paper-sections"></div>
      <p id="empty-state" class="empty-state" hidden data-i18n="empty">No papers match your search.</p>
    </main>
  </div>

  <footer class="site-footer">
    <p data-i18n="footer">Built with a daily arXiv + Claude crawler. Contributions welcome.</p>
  </footer>

  <script src="assets/i18n.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
